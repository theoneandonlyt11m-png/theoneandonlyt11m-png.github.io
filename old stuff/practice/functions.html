<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>This is a function</title>
</head>
<body>
    <h1>This is a function</h1>
    <script>
        //not a function, duh
        console.log("This is a not function");


        // a function, duh
        function sayHi(){
            console.log("Hi!");
        }
        // running the function, duh
        sayHi();

        // a function with an input, duh
        function sayHiToEveryone(who){
            console.log("Hi " + who);
        }

        // running the function with an input, duh
        sayHiToEveryone("Myer");
        sayHiToEveryone("Tim")

        //functions can have lots of inputs, duh
        function sayHiToTwoPeople(who, who2){
            console.log("Hi " + who + " and " + who2);
        }
        sayHiToTwoPeople("Myer", "Tim");
    </script>
</body>
</html>
