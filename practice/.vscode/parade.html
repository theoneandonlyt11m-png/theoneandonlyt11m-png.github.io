<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parade</title>
<style>
    #myCanvas {
           border: 1px solid #000000;
        }
    </style>
</head>
<body>
    <canvas id="myCanvas" width="800" height="800"></canvas>
    <script>
        const canvas = document.getElementById('myCanvas');
        const ctx = canvas.getContext('2d');
        let x = 1;
        let y = 100;
        let x2 = 1
        let x3 = 1;
        let x4 = 1;
        let x5 = 1;
        let x6 = 1;
        let x7 = 1;
        let x8 = 1;
        let x9 = 1;
        let x10 = 1;
        let x11 = 1;
        let x12 = 1;
        let x13 = 1;
        let x14 = 1;
        let speed = 5;
        let time = 0;
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillRect(x, y, 30, 30);
            ctx.fillStyle = '#4ECDC4';
            ctx.fillRect(x3, 100, 30, 30);
            ctx.fillStyle = '#FFE66D';
            ctx.fillRect(x4, 100, 30, 30);
            ctx.fillStyle = '#95E1D3';
            ctx.fillRect(x2, 100, 30, 30);
            ctx.fillStyle = '#C7CEEA';
            ctx.fillRect(x5, 100, 30, 30);
            ctx.fillStyle = '#FF6B6B';
            ctx.fillRect(x6, 100, 30, 30);
            ctx.fillStyle = '#4ECDC4';
            ctx.fillRect(x7, 100, 30, 30);
            ctx.fillStyle = '#F7DC6F';
            ctx.fillRect(x8, 200, 30, 30);
            ctx.fillStyle = '#BB8FCE';
            ctx.fillRect(x9, 200, 30, 30);
            ctx.fillStyle = '#85C1E2';
            ctx.fillRect(x10, 200, 30, 30);
            ctx.fillStyle = '#F8B88B';
            ctx.fillRect(x11, 200, 30, 30);
            ctx.fillStyle = '#A8E6CF';
            ctx.fillRect(x12, 200, 30, 30);
            ctx.fillStyle = '#FFD3B6';
            ctx.fillRect(x13, 200, 30, 30);
            ctx.fillStyle = '#FFAAA5';
            ctx.fillRect(x14, 200, 30, 30);
            time += 1;

                if (time < 170) {
                x += speed;
                }

                if (time == 100) {
                    y -= 20;
                }

                if (time > 0) {
                x2 += speed;
                }
                if (time > 30) {
                    x3 += speed;
                }
    
                if (time > 50) {
                    x4 += speed;
                }
    
                if (time > 70) {
                    x5 += speed;
                }

                if (time > 90) {
                    x6 += speed;
                }
                if (time > 110) {
                    x7 += speed;
                }

                if (time < 170) {
                    x8 += speed;
                }

                if (time > 0) {
                    x9 += speed;
                }
            
                if (time > 30) {
                    x10 += speed;
                }
            
                if (time > 50) {
                    x11 += speed;
                }
            
                if (time > 70) {
                    x12 += speed;
                }

                if (time > 90) {
                    x13 += speed;
                }

                if (time > 110) {
                    x14 += speed;
                }
                 

            

                

            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
